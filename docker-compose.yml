services:
  toms:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/data/toms.db
      - JWT_SECRET=test-secret
      - HCM_BASE_URL=http://mock-hcm:4000
    volumes:
      - toms-data:/data
    depends_on:
      mock-hcm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-hcm:
    build: ./test/mock-hcm
    ports:
      - "4000:4000"
    environment:
      - MOCK_HCM_PORT=4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/admin/reset"] # Admin reset is a good proxy for health
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  toms-data:
